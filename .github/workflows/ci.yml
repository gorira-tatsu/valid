name: ci-standard

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Run standard test suite
        run: cargo test
  test-varisat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Run test suite with embedded SAT backend
        run: cargo test --features varisat-backend
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Compare benchmark baselines
        run: ./scripts/benchmark-suite.sh compare
      - name: Upload benchmark reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-reports
          path: artifacts/benchmarks
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Run contract check when lock file exists
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/ci
          if [[ -f valid.lock.json ]]; then
            cargo run --quiet --bin cargo-valid -- contract check valid.lock.json --json | tee artifacts/ci/contract-check.json
          else
            echo "No valid.lock.json found; skipping contract check."
          fi
      - name: Upload contract artifact
        if: always() && hashFiles('artifacts/ci/contract-check.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: ci-contract
          path: artifacts/ci/contract-check.json
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Evaluate coverage gate
        run: python3 scripts/ci/coverage_gate.py
      - name: Upload coverage artifacts
        if: always() && hashFiles('artifacts/ci/coverage/*.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: ci-coverage
          path: artifacts/ci/coverage/
