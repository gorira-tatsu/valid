name: release-binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: valid-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: valid-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build release binaries with embedded SAT backend
        run: cargo build --release --target ${{ matrix.target }} --features varisat-backend
      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.asset_name }}
          cp target/${{ matrix.target }}/release/valid dist/${{ matrix.asset_name }}/
          cp target/${{ matrix.target }}/release/cargo-valid dist/${{ matrix.asset_name }}/
          tar -czf ${{ matrix.asset_name }}.tar.gz -C dist/${{ matrix.asset_name }} valid cargo-valid
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.tar.gz

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: valid-*
          merge-multiple: true
      - name: Generate release notes from commit log
        shell: bash
        run: |
          current_tag="${GITHUB_REF_NAME}"
          current_commit="$(git rev-list -n 1 "${current_tag}")"
          previous_tag="$(git describe --tags --abbrev=0 "${current_commit}^" 2>/dev/null || true)"

          {
            echo "## Commit log"
            echo

            if [ -n "${previous_tag}" ]; then
              echo "Changes since \`${previous_tag}\`:"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "${previous_tag}..${current_commit}"
            else
              echo "Initial release history:"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "${current_commit}"
            fi
          } > release-notes.md
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release edit "${tag}" --title "${tag}" --notes-file release-notes.md
            gh release upload "${tag}" dist/*.tar.gz --clobber
          else
            gh release create "${tag}" dist/*.tar.gz --title "${tag}" --notes-file release-notes.md
          fi
